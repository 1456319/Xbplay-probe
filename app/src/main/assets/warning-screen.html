
<!DOCTYPE html>
<html>
<head>

<style>
*{
    color: #ffffff;
    background: #000000;
    padding: 0;
    margin: 0;
    overflow: hidden;
    box-sizing: border-box;
}
.center {
    width: 100%;
    height: 100%;
    padding: 10px;
    text-align: center;
    position: relative;

}
body {
    border: 3px solid #FF0000;
    height: 100%;
    width: 100%;
    position: absolute;
}
.bottom {
    position: absolute;
    width: 90%;
    height: 50%;
    bottom: 0%;
    left:5%;
}
img {
  object-fit: cover;
}

</style>
</head>
<body>


<div class="center">
    <h2>Internet Connection Error</h2>
    <p>Ensure you are connected to the internet and restart the app.</p>
    <div class="bottom">
        <img src="warning.png" alt="Error Cannot Load!">
    </div>
</div>


</body>
</html>
